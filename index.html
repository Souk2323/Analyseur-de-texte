<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyseur de texte - Soukaina</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div id="cv-header">
        <h1>Mon CV & Analyseur de Texte</h1>
        <p>Projet réalisé par Soukaina</p>
    </div>

    <div id="container">
        <input type="file" id="fileInput">
        <br><br>
        <input type="text" id="delims" placeholder="Délimiteurs (ex: ,;.)" value=",;. ">
        <br><br>
        
        <button id="btnSegmentation">Segmentation</button>
        <button id="btnBonjour">Dire Bonjour</button>
        <button id="btnAide">Aide</button>

        <div id="aide" style="display:none; background:white; padding:10px; margin-top:10px; border:1px solid black;">
            <p>Chargez un fichier .txt, entrez les délimiteurs, et cliquez sur Segmentation.</p>
        </div>

        <div class="affichage-flex">
            <div class="box" id="affichageGauche">Texte brut ici...</div>
            <div class="box" id="affichageDroit">Résultat ici...</div>
        </div>
        
        <p id="stats">Nombre de formes : 0</p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
