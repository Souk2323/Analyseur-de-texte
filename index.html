<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projet L2 - Soukaina Elkasmi</title>
    <style>
        body { background-color: #CCCC00; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #interface { background-color: #D3A4B0; border: 2px solid #666; padding: 20px; width: 90%; margin: auto; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }
        h1 { color: white; text-shadow: 2px 2px #666; }
        .zones { display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 10px; }
        textarea { width: 95%; height: 200px; background-color: white; border: 1px solid #666; }
        .boutons { margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        button { background-color: #A3C691; border: 1px solid #666; cursor: pointer; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        input[type="text"] { width: 150px; }
    </style>
</head>
<body>
    <h1>Analyse des données dans un fichier</h1>
    <div id="interface">
        <p>Sélectionner un fichier .txt : <input type="file" id="monFichier"></p>
        
        <div style="font-size: 0.8em; margin-bottom: 10px;">
            DÉLIMITEURS: <input type="text" id="delim" value='[ ,\.?!\n\r\t\(\)\[\]"&;:]+'> 
            PÔLE: <input type="text" id="pole" placeholder="mot à chercher..."> 
        </div>

        <button id="btn_bonjour">Bonjour</button>

        <div class="boutons">
            <button id="btn_segmenter">Segmentation</button>
            <button id="btn_dict">Dictionnaire</button>
            <button id="btn_grep">GREP</button>
            <button id="btn_phrases">Nombre de phrases</button>
            <button id="btn_longs">Mots les plus longs</button>
        </div>

        <div class="zones">
            <textarea id="entree" placeholder="Texte source..."></textarea>
            <textarea id="sortie" placeholder="Résultat..." readonly></textarea>
        </div>
    </div>
    <script src="assets/JS/main.js"></script>
</body>
</html>
