<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CV et Projet TAL - Soukaina El Kasmi</title>
    <style>
        /* --- STYLE DU CV (Gris clair) --- */
        body { background-color: #d8e0d8; font-family: sans-serif; margin: 0; padding: 20px; color: #000; }
        .cv-container { background-color: white; max-width: 800px; margin: 0 auto 30px auto; padding: 20px; border: 1px solid #000; text-align: center; }
        .cv-table { border-collapse: collapse; margin: 10px auto; }
        .cv-table td { border: 1px solid #000; padding: 5px; font-size: 0.9em; }
        
        /* --- STYLE DU PROJET (Jaune et Rose du prof) --- */
        #projet-section { background-color: #CCCC00; padding: 30px 10px; border: 2px solid #000; text-align: center; }
        #interface { background-color: #D3A4B0; border: 1px solid #333; padding: 20px; width: 90%; margin: auto; }
        .boutons { margin: 15px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
        button { background-color: #A3C691; border: 1px solid #333; cursor: pointer; padding: 5px 10px; font-weight: bold; }
        textarea { width: 95%; height: 150px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="cv-container">
        <h1>Soukaina El Kasmi</h1>
        <p><strong>Licence 2 des Sciences du Langage</strong></p>
        <p>Mon parcours :</p>
        <table class="cv-table">
            <tr><td>2024-2025</td><td>L1 Sciences du langage</td></tr>
            <tr><td>2025-2026</td><td>L2 Sciences du langage</td></tr>
        </table>
        <p>Dernières lectures : Le Secret de la Mer, La dame de ménage, Incendie...</p>
    </div>

    <div id="projet-section">
        <h2 style="font-style: italic;">Analyse des données dans un fichier</h2>
        <div id="interface">
            <p>Fichier .txt : <input type="file" id="monFichier"></p>
            <p>DÉLIMITEURS : <input type="text" id="delim" value='[ ,\.?!\n\r\t\(\)\[\]"&;:]+'></p>
            <p>PÔLE : <input type="text" id="pole" placeholder="mot à chercher..."></p>
            
            <button id="btn_bonjour">Bonjour</button>
            <div class="boutons">
                <button id="btn_segmenter">Segmentation</button>
                <button id="btn_dict">Dictionnaire</button>
                <button id="btn_grep">GREP</button>
                <button id="btn_phrases">Nombre de phrases</button>
                <button id="btn_longs">Mots les plus longs</button>
            </div>

            <textarea id="entree" placeholder="Texte source..."></textarea>
            <textarea id="sortie" placeholder="Résultats..." readonly></textarea>
        </div>
    </div>

    <script src="assets/JS/main.js"></script>
</body>
</html>
